services:
  # 1. Go API (Web Service)
  - type: web
    name: tbo-backend
    runtime: go
    buildCommand: go build -o api ./main.go
    startCommand: ./api
    plan: free # Change to starter/pro for production
    envVars:
      - key: PORT
        value: 10000
      - key: ENV
        value: production
      - key: DATABASE_URL
        value: "postgresql://postgres.qxucskcqnzpalfvsyyak:8FhNNBN5N3BWxqBn@aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require"
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000, https://tbo-voyage-hack-frontend.vercel.app"
      - key: FRONTEND_URL
        value: "https://tbo-voyage-hack-frontend.vercel.app"
      - key: REDIS_URL
        value: "none"
