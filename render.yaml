services:
  # 1. Go API (Web Service)
  - type: web
    name: tbo-backend
    runtime: go
    buildCommand: go build -o api ./cmd/api
    startCommand: ./api
    plan: free # Change to starter/pro for production
    envVars:
      - key: PORT
        value: 10000
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tbo-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000" # Change this to your frontend URL later
      - key: REDIS_URL
        value: "none" # Disables Redis/Asynq

databases:
  # 2. PostgreSQL (v16)
  - name: tbo-db
    plan: free # Change to starter/pro for production
    databaseName: tbo_db
    user: tbo_user
    ipAllowList: [] # Adjust as needed
